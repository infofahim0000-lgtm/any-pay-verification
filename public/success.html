<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful — ZksiPay</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #7c3aed;
      --success: #10b981;
      --bg: #0f0a1e;
      --card: #1e1540;
      --text: #f1f0f5;
      --muted: #9ca3af;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 30%, rgba(16,185,129,0.1) 0%, transparent 60%);
      pointer-events: none;
    }
    .card {
      position: relative;
      background: var(--card);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 20px;
      padding: 48px 36px;
      width: 100%;
      max-width: 460px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .check-circle {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--success), #34d399);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 2.6rem;
      box-shadow: 0 0 50px rgba(16,185,129,0.4);
      animation: pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    @keyframes pop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    h1 { font-size: 1.8rem; font-weight: 800; color: var(--success); margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: 0.85rem; line-height: 1.6; margin-bottom: 28px; }
    .detail-box {
      background: rgba(16,185,129,0.06);
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: 14px;
      padding: 6px 0;
      margin-bottom: 28px;
      text-align: left;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 20px;
      font-size: 0.9rem;
    }
    .detail-row:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.06); }
    .detail-row .key { color: var(--muted); font-weight: 500; }
    .detail-row .val { font-weight: 700; color: var(--text); }
    .detail-row .val.amount { color: #34d399; font-size: 1.1rem; }
    .detail-row .val.trx {
      font-family: "Courier New", monospace;
      font-size: 0.82rem;
      color: #a78bfa;
      background: rgba(124,58,237,0.1);
      padding: 4px 10px;
      border-radius: 6px;
    }
    .btn-home {
      display: inline-block;
      padding: 14px 36px;
      background: linear-gradient(135deg, var(--primary), #9333ea);
      color: #fff;
      font-family: "Inter", sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(124,58,237,0.4);
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .btn-home:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(124,58,237,0.6); }
    @media (max-width: 480px) { .card { padding: 32px 18px; } }
  </style>
</head>
<body>
<div class="card">
  <div class="check-circle">✅</div>
  <h1>Payment Successful!</h1>
  <p class="subtitle">Your payment has been verified and recorded.<br/>Please save your TRX ID for reference.</p>

  <div class="detail-box">
    <div class="detail-row">
      <span class="key">Name</span>
      <span class="val" id="dName">—</span>
    </div>
    <div class="detail-row">
      <span class="key">Number</span>
      <span class="val" id="dNumber">—</span>
    </div>
    <div class="detail-row">
      <span class="key">Amount Paid</span>
      <span class="val amount" id="dAmount">—</span>
    </div>
    <div class="detail-row">
      <span class="key">TRX ID</span>
      <span class="val trx" id="dTrx">—</span>
    </div>
  </div>

  <a href="/" class="btn-home">← Back to Home</a>
</div>

<script>
  const p = new URLSearchParams(window.location.search);
  document.getElementById('dName').textContent   = p.get('name')   || '—';
  document.getElementById('dNumber').textContent = p.get('number') || '—';
  document.getElementById('dAmount').textContent = p.get('amount') ? '৳ ' + parseFloat(p.get('amount')).toFixed(2) : '—';
  document.getElementById('dTrx').textContent    = p.get('trxId')  || '—';
</script>
</body>
</html>
