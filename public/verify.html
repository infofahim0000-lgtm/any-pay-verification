<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Payment — ZksiPay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #7c3aed;
      --primary-dark: #5b21b6;
      --accent: #06b6d4;
      --bg: #0f0a1e;
      --card: #1e1540;
      --border: rgba(124,58,237,0.25);
      --text: #f1f0f5;
      --muted: #9ca3af;
      --radius: 16px;
      --bkash: #e2136e;
      --nagad: #f05a28;
      --rocket: #8b1fa9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 30% 20%, rgba(124,58,237,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 70% 80%, rgba(6,182,212,0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .card-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .card-header .icon {
      font-size: 2.4rem;
      margin-bottom: 10px;
    }

    .card-header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .card-header p {
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* Payer info box */
    .info-box {
      background: rgba(124,58,237,0.08);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 0.88rem;
    }

    .info-row:not(:last-child) {
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .info-row .key { color: var(--muted); }
    .info-row .val { font-weight: 600; color: var(--text); }
    .info-row .val.amount { color: #a78bfa; font-size: 1rem; }

    /* Form */
    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #c4b5fd;
      margin-bottom: 7px;
    }

    select,
    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: "Inter", sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
    }

    select { cursor: pointer; }

    select:focus,
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
    }

    input.trx-input { font-family: "Courier New", monospace; letter-spacing: 1px; }

    /* Spinner */
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-verify {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), #9333ea);
      color: #fff;
      font-family: "Inter", sans-serif;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(124,58,237,0.45);
      transition: transform 0.18s, box-shadow 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 50px;
    }

    .btn-verify:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(124,58,237,0.6); }
    .btn-verify:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .error-box {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.4);
      color: #fca5a5;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.82rem;
      text-decoration: none;
    }

    .back-link:hover { color: var(--primary); }

    @media (max-width: 480px) {
      .card { padding: 28px 18px; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="icon">🔍</div>
    <h1>Verify Payment</h1>
    <p>Enter your transaction details to confirm payment</p>
  </div>

  <!-- Payer info (from URL params) -->
  <div class="info-box" id="infoBox">
    <div class="info-row">
      <span class="key">Name</span>
      <span class="val" id="dispName">—</span>
    </div>
    <div class="info-row">
      <span class="key">Number</span>
      <span class="val" id="dispNumber">—</span>
    </div>
    <div class="info-row">
      <span class="key">Amount</span>
      <span class="val amount" id="dispAmount">—</span>
    </div>
    <div class="info-row">
      <span class="key">Order ID</span>
      <span class="val" id="dispOrder" style="font-size:0.78rem;color:#a78bfa;">—</span>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <form id="verifyForm">
    <div class="form-group">
      <label for="mfs">Payment Method *</label>
      <select id="mfs" required>
        <option value="">— Select Method —</option>
        <option value="bkash">bKash</option>
        <option value="nagad">Nagad</option>
        <option value="rocket">Rocket</option>
      </select>
    </div>

    <div class="form-group">
      <label for="trxid">TRX ID *</label>
      <input
        type="text"
        id="trxid"
        class="trx-input"
        placeholder="e.g. ABC1234567890"
        required
      />
    </div>

    <button type="submit" class="btn-verify" id="verifyBtn">
      <span id="btnText">Verify Payment</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </form>

  <a href="/" class="back-link">← Back to Home</a>
</div>

<script>
  // ── Read URL params ──
  const params  = new URLSearchParams(window.location.search);
  const name    = params.get('name')    || '';
  const number  = params.get('number')  || '';
  const amount  = params.get('amount')  || '';
  const orderId = params.get('orderId') || '';

  document.getElementById('dispName').textContent   = name    || '—';
  document.getElementById('dispNumber').textContent = number  || '—';
  document.getElementById('dispAmount').textContent = amount ? '৳' + parseFloat(amount).toFixed(2) : '—';
  document.getElementById('dispOrder').textContent  = orderId || '—';

  // ── Form submit ──
  document.getElementById('verifyForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const errorBox  = document.getElementById('errorBox');
    const verifyBtn = document.getElementById('verifyBtn');
    const btnText   = document.getElementById('btnText');
    const spinner   = document.getElementById('spinner');

    errorBox.style.display = 'none';

    const mfs   = document.getElementById('mfs').value;
    const trxid = document.getElementById('trxid').value.trim();

    if (!mfs) {
      errorBox.textContent = 'Please select a payment method.';
      errorBox.style.display = 'block';
      return;
    }
    if (!trxid) {
      errorBox.textContent = 'Please enter your TRX ID.';
      errorBox.style.display = 'block';
      return;
    }

    // Show spinner
    verifyBtn.disabled = true;
    btnText.style.display = 'none';
    spinner.style.display = 'block';

    try {
      const res = await fetch('/.netlify/functions/verify-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ trxid, mfs, amount, name, number, orderId }),
      });

      const data = await res.json();

      if (data.success) {
        // Redirect to success page with all details
        const q = new URLSearchParams({
          name,
          number,
          amount,
          trxId: trxid,
          method: mfs,
          orderId,
        });
        window.location.href = '/success.html?' + q.toString();
      } else {
        errorBox.textContent = data.error || 'Verification failed. Please check your TRX ID.';
        errorBox.style.display = 'block';
        verifyBtn.disabled = false;
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
      }
    } catch (err) {
      errorBox.textContent = 'Network error. Please try again.';
      errorBox.style.display = 'block';
      verifyBtn.disabled = false;
      btnText.style.display = 'inline';
      spinner.style.display = 'none';
    }
  });
</script>
</body>
</html>
