<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifying Payment — ZksiPay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #7c3aed;
      --accent: #06b6d4;
      --success: #10b981;
      --danger: #ef4444;
      --bg: #0f0a1e;
      --card: #1e1540;
      --border: rgba(124,58,237,0.25);
      --text: #f1f0f5;
      --muted: #9ca3af;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 30%, rgba(124,58,237,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 44px 36px;
      width: 100%;
      max-width: 460px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner-wrap { margin-bottom: 24px; }

    .spinner {
      width: 64px;
      height: 64px;
      border: 4px solid rgba(124,58,237,0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; }

    .subtitle { color: var(--muted); font-size: 0.88rem; margin-bottom: 24px; }

    /* Info box */
    .info-box {
      background: rgba(124,58,237,0.08);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      text-align: left;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 0.85rem;
    }

    .info-row:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.06); }
    .info-row .key { color: var(--muted); }
    .info-row .val { font-weight: 600; }
    .info-row .val.trx { font-family: monospace; color: #a78bfa; font-size: 0.8rem; }
    .info-row .val.amount { color: #34d399; }

    /* Status states */
    .status-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      display: none;
    }

    .error-box {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.4);
      color: #fca5a5;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }

    /* Manual form (fallback) */
    .manual-form { display: none; text-align: left; }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #c4b5fd;
      margin-bottom: 7px;
    }

    select, input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: "Inter", sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }

    select:focus, input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
    }

    input.trx-input { font-family: monospace; letter-spacing: 1px; }

    .btn-verify {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), #9333ea);
      color: #fff;
      font-family: "Inter", sans-serif;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(124,58,237,0.45);
      transition: transform 0.18s;
      margin-top: 4px;
    }

    .btn-verify:hover { transform: translateY(-2px); }
    .btn-verify:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn-home {
      display: inline-block;
      margin-top: 16px;
      padding: 11px 28px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text);
      border-radius: 10px;
      font-family: "Inter", sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-home:hover { background: rgba(255,255,255,0.12); }

    @media (max-width: 480px) { .card { padding: 32px 18px; } }
  </style>
</head>
<body>

<div class="card">
  <!-- Loading state -->
  <div id="stateLoading">
    <div class="spinner-wrap"><div class="spinner"></div></div>
    <h1>Verifying Payment…</h1>
    <p class="subtitle">Please wait, checking your transaction</p>
    <div class="info-box" id="infoBox" style="display:none;">
      <div class="info-row">
        <span class="key">Name</span>
        <span class="val" id="dispName">—</span>
      </div>
      <div class="info-row">
        <span class="key">Number</span>
        <span class="val" id="dispNumber">—</span>
      </div>
      <div class="info-row">
        <span class="key">Amount</span>
        <span class="val amount" id="dispAmount">—</span>
      </div>
      <div class="info-row">
        <span class="key">TRX ID</span>
        <span class="val trx" id="dispTrx">—</span>
      </div>
    </div>
  </div>

  <!-- Error state -->
  <div id="stateError" style="display:none;">
    <div class="status-icon" style="display:block;">❌</div>
    <h1 style="color:#ef4444;">Verification Failed</h1>
    <p class="subtitle" id="errorMsg">Payment could not be verified.</p>
    <div class="manual-form" id="manualForm">
      <p style="color:var(--muted);font-size:0.83rem;margin-bottom:16px;">
        Auto verify হয়নি। নিচে manually TRX ID দিন:
      </p>
      <div class="error-box" id="manualError"></div>
      <div class="form-group">
        <label>Payment Method</label>
        <select id="mfsSelect">
          <option value="">— Select —</option>
          <option value="bkash">bKash</option>
          <option value="nagad">Nagad</option>
          <option value="rocket">Rocket</option>
        </select>
      </div>
      <div class="form-group">
        <label>TRX ID</label>
        <input type="text" id="trxInput" class="trx-input" placeholder="e.g. DFK7ID2I65" />
      </div>
      <button class="btn-verify" id="manualBtn" onclick="manualVerify()">
        Verify Now
      </button>
    </div>
    <br/>
    <a href="/" class="btn-home">← Try Again</a>
  </div>
</div>

<script>
  // ── Read ALL URL params ──
  const params   = new URLSearchParams(window.location.search);

  // Params from our success_url
  const name     = params.get('name')     || '';
  const number   = params.get('number')   || '';
  const amount   = params.get('amount')   || '';
  const orderId  = params.get('orderId')  || '';

  // Params epay appends automatically
  const status   = params.get('status')   || '';
  const trxid    = params.get('trxid')    || '';
  const gateway  = params.get('gateway')  || '';
  const epayOrderId = params.get('order_id') || orderId;

  // Show info if available
  if (name || trxid) {
    document.getElementById('infoBox').style.display = 'block';
    document.getElementById('dispName').textContent   = name   || '—';
    document.getElementById('dispNumber').textContent = number || '—';
    document.getElementById('dispAmount').textContent = amount ? '৳' + parseFloat(amount).toFixed(2) : '—';
    document.getElementById('dispTrx').textContent    = trxid  || '—';
  }

  // ── Auto verify if epay gave us trxid ──
  async function autoVerify() {
    // Determine mfs from gateway param
    const mfsMap = { bkash: 'bkash', nagad: 'nagad', rocket: 'rocket', bKash: 'bkash', Nagad: 'nagad', Rocket: 'rocket' };
    const mfs = mfsMap[gateway] || 'bkash'; // default bkash if not provided

    try {
      const res = await fetch('/.netlify/functions/verify-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          trxid,
          mfs,
          amount,
          name,
          number,
          orderId: epayOrderId,
        }),
      });

      const data = await res.json();

      if (data.success) {
        // ✅ Redirect to success
        const q = new URLSearchParams({ name, number, amount, trxId: trxid, method: mfs, orderId: epayOrderId });
        window.location.href = '/success.html?' + q.toString();
      } else {
        showManualForm(data.error || 'Auto verification failed.');
      }
    } catch (err) {
      showManualForm('Network error. Please verify manually.');
    }
  }

  // ── Show manual form ──
  function showManualForm(msg) {
    document.getElementById('stateLoading').style.display = 'none';
    document.getElementById('stateError').style.display   = 'block';
    document.getElementById('errorMsg').textContent = msg;

    const manualForm = document.getElementById('manualForm');
    manualForm.style.display = 'block';

    // Pre-fill TRX ID if we have it
    if (trxid) document.getElementById('trxInput').value = trxid;

    // Pre-select gateway
    const mfsMap = { bkash: 'bkash', nagad: 'nagad', rocket: 'rocket', bKash: 'bkash', Nagad: 'nagad', Rocket: 'rocket' };
    if (gateway && mfsMap[gateway]) {
      document.getElementById('mfsSelect').value = mfsMap[gateway];
    }
  }

  // ── Manual verify ──
  async function manualVerify() {
    const btn      = document.getElementById('manualBtn');
    const errBox   = document.getElementById('manualError');
    const mfs      = document.getElementById('mfsSelect').value;
    const trxInput = document.getElementById('trxInput').value.trim();

    errBox.style.display = 'none';

    if (!mfs)      { errBox.textContent = 'Payment method select করুন।'; errBox.style.display = 'block'; return; }
    if (!trxInput) { errBox.textContent = 'TRX ID দিন।'; errBox.style.display = 'block'; return; }

    btn.disabled = true;
    btn.textContent = 'Verifying…';

    try {
      const res = await fetch('/.netlify/functions/verify-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          trxid:   trxInput,
          mfs,
          amount,
          name,
          number,
          orderId: epayOrderId,
        }),
      });

      const data = await res.json();

      if (data.success) {
        const q = new URLSearchParams({ name, number, amount, trxId: trxInput, method: mfs, orderId: epayOrderId });
        window.location.href = '/success.html?' + q.toString();
      } else {
        errBox.textContent = data.error || 'Verification failed.';
        errBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Verify Now';
      }
    } catch (err) {
      errBox.textContent = 'Network error. Try again.';
      errBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Verify Now';
    }
  }

  // ── Start: auto verify if trxid available ──
  if (trxid && status === 'success') {
    // epay gave us everything — auto verify!
    autoVerify();
  } else if (status === 'success' && !trxid) {
    // Success but no trxid — show manual form
    showManualForm('TRX ID পাওয়া যায়নি। নিচে manually দিন।');
  } else {
    // No status — show manual form
    showManualForm('Payment info পাওয়া যায়নি। নিচে manually দিন।');
  }
</script>
</body>
</html>
