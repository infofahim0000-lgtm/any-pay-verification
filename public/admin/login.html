<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — ZksiPay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #7c3aed;
      --bg: #0f0a1e;
      --card: #1e1540;
      --border: rgba(124,58,237,0.25);
      --text: #f1f0f5;
      --muted: #9ca3af;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 20%, rgba(124,58,237,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 44px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .logo {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .card-title {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .card-sub {
      text-align: center;
      color: var(--muted);
      font-size: 0.83rem;
      margin-bottom: 30px;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #c4b5fd;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: "Inter", sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
    }

    input::placeholder { color: var(--muted); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), #9333ea);
      color: #fff;
      font-family: "Inter", sans-serif;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(124,58,237,0.45);
      transition: transform 0.18s, box-shadow 0.18s;
      margin-top: 4px;
    }

    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(124,58,237,0.6); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .error-box {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.4);
      color: #fca5a5;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }

    @media (max-width: 480px) {
      .card { padding: 32px 18px; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">⚡ ZksiPay</div>
  <h1 class="card-title">Admin Login</h1>
  <p class="card-sub">Sign in to access the dashboard</p>

  <div class="error-box" id="errorBox"></div>

  <form id="loginForm">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="admin@example.com" required />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required />
    </div>
    <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
  </form>
</div>

<!-- Firebase CDN -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    onAuthStateChanged,
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyANqq2iqr_JDMUDA27ShTllLFPlwX3Ip2A",
    authDomain: "my-webh.firebaseapp.com",
    projectId: "my-webh",
    storageBucket: "my-webh.firebasestorage.app",
    messagingSenderId: "460800280339",
    appId: "1:460800280339:web:a418205bebb27765ee3ce6",
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // If already logged in → go to dashboard
  onAuthStateChanged(auth, (user) => {
    if (user) window.location.href = '/admin/dashboard.html';
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const errorBox  = document.getElementById('errorBox');
    const loginBtn  = document.getElementById('loginBtn');
    const email     = document.getElementById('email').value.trim();
    const password  = document.getElementById('password').value;

    errorBox.style.display = 'none';
    loginBtn.disabled = true;
    loginBtn.textContent = 'Signing in…';

    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = '/admin/dashboard.html';
    } catch (err) {
      const msgs = {
        'auth/user-not-found':  'No account found with this email.',
        'auth/wrong-password':  'Incorrect password.',
        'auth/invalid-email':   'Invalid email address.',
        'auth/too-many-requests': 'Too many attempts. Try again later.',
      };
      errorBox.textContent = msgs[err.code] || 'Login failed. Please try again.';
      errorBox.style.display = 'block';
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
