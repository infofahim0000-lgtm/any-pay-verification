<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Failed — ZksiPay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #7c3aed;
      --danger: #ef4444;
      --bg: #0f0a1e;
      --card: #1e1540;
      --border: rgba(239,68,68,0.25);
      --text: #f1f0f5;
      --muted: #9ca3af;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 30%, rgba(239,68,68,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 44px 36px;
      width: 100%;
      max-width: 440px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .x-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--danger), #f87171);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 2.2rem;
      box-shadow: 0 0 40px rgba(239,68,68,0.35);
      animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes pop {
      0%   { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 8px;
      color: var(--danger);
    }

    .reason-box {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 12px;
      padding: 14px 18px;
      margin: 20px 0 28px;
      color: #fca5a5;
      font-size: 0.9rem;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 28px;
      border-radius: 12px;
      font-family: "Inter", sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.18s, box-shadow 0.18s;
      border: none;
    }

    .btn-retry {
      background: linear-gradient(135deg, var(--primary), #9333ea);
      color: #fff;
      box-shadow: 0 8px 24px rgba(124,58,237,0.4);
    }

    .btn-retry:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(124,58,237,0.6);
    }

    .btn-home {
      background: rgba(255,255,255,0.07);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .btn-home:hover {
      background: rgba(255,255,255,0.12);
      transform: translateY(-2px);
    }

    @media (max-width: 480px) {
      .card { padding: 32px 18px; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="x-circle">✕</div>
  <h1>Payment Failed</h1>

  <div class="reason-box" id="reasonBox">
    Something went wrong with your payment.
  </div>

  <div class="btn-group">
    <a href="/" class="btn btn-retry">↩ Try Again</a>
    <a href="/" class="btn btn-home">🏠 Home</a>
  </div>
</div>

<script>
  const reasonMap = {
    payment_failed: '❌ Your payment could not be processed. Please try again.',
    cancelled:      '🚫 You cancelled the payment. You can try again anytime.',
    timeout:        '⏱ Payment timed out. Please try again.',
  };

  const reason = new URLSearchParams(window.location.search).get('reason') || '';
  document.getElementById('reasonBox').textContent =
    reasonMap[reason] || 'Something went wrong. Please try again.';
</script>
</body>
</html>
